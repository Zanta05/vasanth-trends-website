<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vasanth Trends Login</title>


<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,
body{
display:grid;
height:100vh;
width:100%;
place-items:center;
background:linear-gradient(to right,#27b8e4,#ff0080);
}

.container{
background:#fff;
max-width:350px;
width:100%;
padding:25px 30px;
border-radius:5px;
box-shadow:0 10px 10px rgba(0,0,0,0.15);
}

.container .title{
font-size:30px;
font-weight:600;
margin-bottom:20px;
position:relative;
}

.container .title::before{
content:'';
position:absolute;
height:3px;
width:30px;
left:0;
bottom:0;
}

.container form .input-box{
width:100%;
height:45px;
margin-top:25px;
position:relative;
}

.container form .input-box input{
width:100%;
height:100%;
outline:none;
border:none;
font-size:16px;
border-bottom:2px solid silver;
}

.container form .input-box .underline{
position:absolute;
height:2px;
width:100%;
bottom:0;
left:0;
}

.input-box .underline:before{
position:absolute;
content:"";
height:100%;
width:100%;
background:#ff0080;
transform:scaleX(0);
transform-origin:left;
transition:all 0.3s ease;
}

.input-box input:focus ~ .underline:before{
transform:scaleX(1);
}

.container form .button{
margin-top:40px;
}

.container form .button input{
background:#ff0080;
font-size:17px;
color:#fff;
border-radius:5px;
cursor:pointer;
transition:all 0.3s ease;
}

.container form .button input:hover{
background:#cc0066;
}

.container .option{
font-size:14px;
text-align:center;
margin-top:20px;
}

.container .twitter a,
.container .facebook a{
display:block;
width:100%;
height:45px;
font-size:15px;
text-decoration:none;
padding-left:20px;
line-height:45px;
color:#fff;
border-radius:5px;
margin-top:10px;
}

.twitter a{
background:#1da1f2;
}

.facebook a{
background:#3b5998;
}

.twitter a i,
.facebook a i{
padding-right:10px;
}
</style>
</head>

<body>

    
<div class="container">

<div class="title">Vasanth Trends Login </div>

<form action="#">

<div class="input-box">
<input type="text" placeholder="Enter Your Email" required>
<div class="underline"></div>
</div>

<div class="input-box">
<input type="password" placeholder="Enter Your Password" required>
<div class="underline"></div>
</div>

<div class="input-box button">
<input type="submit" value="Continue">
</div><br>
 
<center><a href="register.html">Register</a></center>

</form>

<div class="option">Or Connect With Social Media</div>

<div class="twitter">
<a href="http://twitter.com/"><i class="fa-brands fa-twitter"></i> Login with Twitter</a>
</div>

<div class="facebook">
<a href="https://www.facebook.com/"><i class="fa-brands fa-facebook-f"></i> Login with Facebook</a>
</div>
<br>
<center><a href="vasanth13.html">Go to home</a></center>

</div>

</body>
</html>
